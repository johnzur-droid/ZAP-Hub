<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAP — Zur's Activity Planner</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #000;
    color: #e5e7eb;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
  }
  .logo-wrap { margin-bottom: 40px; text-align: center; }
  .logo-wrap img { width: 260px; max-width: 85vw; height: auto; display: block; margin: 0 auto; }
  .cards {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 100%;
    max-width: 380px;
  }
  .card {
    background: #0d1f0d;
    border: 1px solid #1a3a1a;
    border-radius: 12px;
    padding: 24px;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .card-icon { font-size: 40px; flex-shrink: 0; }
  .card-title { font-size: 18px; font-weight: 800; color: #ffffff; margin-bottom: 4px; }
  .card-sub { font-size: 12px; color: #9ca3af; line-height: 1.4; }
  .card-arrow { margin-left: auto; font-size: 20px; color: #FDE047; flex-shrink: 0; }
  .footer { margin-top: 40px; font-size: 11px; color: #9ca3af; text-align: center; }
</style>
</head>
<body>
  <div class="logo-wrap">
    <img src="https://res.cloudinary.com/dovzgljte/image/upload/w_480,q_auto,f_auto/ZAP_Activity_Logo_S253_final.png" alt="ZAP — Zur's Activity Planner">
  </div>
  <div class="cards">
    <a class="card" href="https://zap-golf.netlify.app">
      <div class="card-icon">⛳</div>
      <div class="card-text">
        <div class="card-title">ZAP Golf</div>
        <div class="card-sub">Hyper-local golf weather for the Jersey Circuit</div>
      </div>
      <div class="card-arrow">›</div>
    </a>
    <a class="card" href="https://zap-all-activities.netlify.app">
      <div class="card-icon">🚴</div>
      <div class="card-text">
        <div class="card-title">ZAP Pro</div>
        <div class="card-sub">Outdoor activity planner for any location</div>
      </div>
      <div class="card-arrow">›</div>
    </a>
  </div>
  <div class="footer">© John Zur 2026 · zapapp.net</div>
</body>
</html>
