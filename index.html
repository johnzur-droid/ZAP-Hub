<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAP — Zur's Activity Planner</title>
<link rel="icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/icon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/icon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#004d26">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #000;
    color: #e5e7eb;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
  }
  .logo-wrap { margin-bottom: 40px; text-align: center; }
  .logo-wrap img { width: 260px; max-width: 85vw; height: auto; display: block; margin: 0 auto; }
  .cards {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 100%;
    max-width: 380px;
  }
  .card {
    border-radius: 12px;
    padding: 24px;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .card-pro {
    background: #1c1c1c;
    border: 1px solid #bf9d6f;
  }
  .card-golf {
    background: #0d1f0d;
    border: 1px solid #1a3a1a;
  }
  .card-icon { font-size: 40px; flex-shrink: 0; }
  .card-title-pro { font-size: 18px; font-weight: 800; color: #FACC15; margin-bottom: 4px; }
  .card-title-golf { font-size: 18px; font-weight: 800; color: #ffffff; margin-bottom: 4px; }
  .card-sub-pro { font-size: 12px; color: #9ca3af; line-height: 1.4; }
  .card-sub-golf { font-size: 12px; color: #9ca3af; line-height: 1.4; }
  .card-arrow-pro { margin-left: auto; font-size: 20px; color: #bf9d6f; flex-shrink: 0; }
  .card-arrow-golf { margin-left: auto; font-size: 20px; color: #4ADE80; flex-shrink: 0; }
  .footer { margin-top: 40px; font-size: 11px; color: #9ca3af; text-align: center; }
</style>
</head>
<body>
  <div class="logo-wrap">
    <img src="https://res.cloudinary.com/dovzgljte/image/upload/w_480,q_auto,f_auto/ZAP_Activity_Logo_S253_final.png" alt="ZAP — Zur's Activity Planner">
  </div>
  <div class="cards">
    <a class="card card-pro" href="https://pro.zapapp.net">
      <div class="card-icon">🚴</div>
      <div class="card-text">
        <div class="card-title-pro">ZAP Pro</div>
        <div class="card-sub-pro">Outdoor activity planner for any location</div>
      </div>
      <div class="card-arrow-pro">›</div>
    </a>
    <a class="card card-golf" href="https://golf.zapapp.net">
      <div class="card-icon">⛳</div>
      <div class="card-text">
        <div class="card-title-golf">ZAP Golf</div>
        <div class="card-sub-golf">Hyper-local golf weather for the Jersey Circuit</div>
      </div>
      <div class="card-arrow-golf">›</div>
    </a>
  </div>
  <div class="footer">© John Zur 2026 · zapapp.net</div>
</body>
</html>
