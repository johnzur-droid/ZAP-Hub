<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAP — Zur's Activity Planner</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #000;
    color: #e5e7eb;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
  }
  .logo {
    font-size: 48px;
    font-weight: 900;
    color: #FDE047;
    letter-spacing: -1px;
    margin-bottom: 6px;
  }
  .tagline {
    font-size: 13px;
    color: #6b7280;
    margin-bottom: 48px;
    text-align: center;
  }
  .cards {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 100%;
    max-width: 380px;
  }
  .card {
    background: #0d1f0d;
    border: 1px solid #1a3a1a;
    border-radius: 12px;
    padding: 28px 24px;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 20px;
    transition: border-color 0.15s, background 0.15s;
  }
  .card:active { background: #132613; }
  .card-icon { font-size: 40px; }
  .card-text {}
  .card-title {
    font-size: 18px;
    font-weight: 800;
    color: #fff;
    margin-bottom: 4px;
  }
  .card-sub {
    font-size: 12px;
    color: #6b7280;
    line-height: 1.4;
  }
  .card-arrow {
    margin-left: auto;
    font-size: 20px;
    color: #FDE047;
  }
  .footer {
    margin-top: 48px;
    font-size: 11px;
    color: #374151;
    text-align: center;
  }
</style>
</head>
<body>
  <div class="logo">ZAP</div>
  <div class="tagline">Zur's Activity Planner</div>
  <div class="cards">
    <a class="card" href="https://zap-golf.netlify.app">
      <div class="card-icon">⛳</div>
      <div class="card-text">
        <div class="card-title">ZAP Golf</div>
        <div class="card-sub">Hyper-local golf weather for the Jersey Circuit</div>
      </div>
      <div class="card-arrow">›</div>
    </a>
    <a class="card" href="https://zap-all-activities.netlify.app">
      <div class="card-icon">🏃</div>
      <div class="card-text">
        <div class="card-title">ZAP Pro</div>
        <div class="card-sub">Outdoor activity planner for any location</div>
      </div>
      <div class="card-arrow">›</div>
    </a>
  </div>
  <div class="footer">© John Zur 2026 · zapapp.net</div>
</body>
</html>
